<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>大觉寺总图 · 现状与设计对比</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    .page {
      width: 100%;
      height: 100%;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      background: #111;
    }

    .viewport {
      width: 100%;
      height: 100%;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      overflow: hidden;
      -ms-touch-action: none;
      touch-action: none;
    }

    .frame-wrap {
      -webkit-transform-origin: center center;
      -ms-transform-origin: center center;
      transform-origin: center center;
    }

    .frame {
      position: relative;
      overflow: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      cursor: ew-resize;
      -ms-touch-action: none;
      touch-action: none;
      background: #000;
      -webkit-tap-highlight-color: transparent;
    }

    .layer {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .layer img,
    .after-layer img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .after-layer {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 12%;
      width: 5px;
      -webkit-transform: translateX(-50%);
      -ms-transform: translateX(-50%);
      transform: translateX(-50%);
      background: #f5a623;
      background: -webkit-linear-gradient(top, #ffe566, #f5a623, #ffe566);
      background: linear-gradient(to bottom, #ffe566, #f5a623, #ffe566);
      box-shadow:
        0 0 0 2px rgba(0, 0, 0, 0.45),
        0 0 20px rgba(255, 200, 50, 0.85),
        0 0 40px rgba(255, 160, 0, 0.45);
      z-index: 10;
      pointer-events: none;
    }

    .handle {
      position: absolute;
      top: 50%;
      left: 12%;
      -webkit-transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #f5a623;
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.55),
        0 6px 28px rgba(0, 0, 0, 0.55);
      z-index: 11;
      pointer-events: none;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
    }

    .handle::before,
    .handle::after {
      content: "";
      width: 0;
      height: 0;
      border-style: solid;
      -webkit-flex-shrink: 0;
      -ms-flex-negative: 0;
      flex-shrink: 0;
    }

    .handle::before {
      border-width: 8px 10px 8px 0;
      border-color: transparent #e67e00 transparent transparent;
      margin-right: 4px;
    }

    .handle::after {
      border-width: 8px 0 8px 10px;
      border-color: transparent transparent transparent #e67e00;
      margin-left: 4px;
    }

    .handle-grip {
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: #f5a623;
      box-shadow: -6px 0 0 #f5a623, 6px 0 0 #f5a623;
      -webkit-flex-shrink: 0;
      -ms-flex-negative: 0;
      flex-shrink: 0;
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 200;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -ms-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      background: #0a0a0a;
      color: #ddd;
      font: 15px/1.5 "PingFang SC", "Microsoft YaHei", sans-serif;
      text-align: center;
      padding: 24px;
    }

    .loading.show {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #f5a623;
      border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @-webkit-keyframes spin {
      to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
    }

    @keyframes spin {
      to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
    }

    .loading-status {
      color: #aaa;
      font-size: 13px;
      margin-top: 6px;
    }

    .zoom-hint {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      -webkit-transform: translateX(-50%);
      -ms-transform: translateX(-50%);
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.72);
      color: #ffe566;
      font: 13px/1.4 "PingFang SC", "Microsoft YaHei", sans-serif;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .zoom-hint.visible {
      display: block;
    }

    .zoom-hint.desktop-hint.visible {
      bottom: auto;
      top: 16px;
      color: #ccc;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      html, body, .page, .viewport {
        height: 100%;
      }
    }

    @media (max-width: 768px) {
      .divider { width: 6px; }
      .handle { width: 68px; height: 68px; border-width: 4px; }
      .handle::before { border-width: 9px 11px 9px 0; }
      .handle::after { border-width: 9px 0 9px 11px; }
      .handle-grip { height: 26px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>图片加载中…</div>
    <div class="loading-status" id="loadingStatus">请稍候</div>
  </div>

  <div class="page">
    <div class="viewport" id="viewport">
      <div class="frame-wrap" id="frameWrap">
        <div class="frame" id="compare">
          <div class="layer">
            <img src="before.jpg" alt="现状" id="beforeImg" decoding="async">
          </div>
          <div class="after-layer" id="afterLayer">
            <img src="after.jpg" alt="设计总图" id="afterImg" decoding="async">
          </div>
          <div class="divider" id="divider"></div>
          <div class="handle" id="handle"><span class="handle-grip"></span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="zoom-hint" id="zoomHint">双指捏合放大 · 双击还原</div>

  <script>
    (function () {
      var viewport = document.getElementById('viewport');
      var frameWrap = document.getElementById('frameWrap');
      var compare = document.getElementById('compare');
      var afterLayer = document.getElementById('afterLayer');
      var beforeImg = document.getElementById('beforeImg');
      var afterImg = document.getElementById('afterImg');
      var divider = document.getElementById('divider');
      var handle = document.getElementById('handle');
      var zoomHint = document.getElementById('zoomHint');
      var loading = document.getElementById('loading');
      var loadingStatus = document.getElementById('loadingStatus');

      var dragging = false;
      var activePointerId = null;
      var dragOffset = 0;
      var pos = 0.12;
      var imgW = 0;
      var imgH = 0;
      var inited = false;
      var eventsBound = false;

      var isMobile = false;
      var mobileLocked = false;
      var zoom = 1;
      var panX = 0;
      var panY = 0;
      var minZoom = 1;
      var maxZoom = 4;

      var gestureMode = 'idle';
      var pinchStartDist = 0;
      var pinchStartZoom = 1;
      var panStartX = 0;
      var panStartY = 0;
      var panOriginX = 0;
      var panOriginY = 0;
      var activePointers = {};
      var lastTapTime = 0;

      var supportsClipPath = (function () {
        var el = document.createElement('div');
        return 'clipPath' in el.style || 'webkitClipPath' in el.style;
      })();

      function detectMobile() {
        if (!mobileLocked) {
          var ua = navigator.userAgent || '';
          var isWeChat = /MicroMessenger/i.test(ua);
          var isPhoneUA = /iPhone|iPod|Android.*Mobile|Windows Phone/i.test(ua);
          var isTabletUA = /iPad|Android(?!.*Mobile)/i.test(ua);
          var isIpadOS = /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1;
          var touch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
          var shortSide = Math.min(window.screen.width || 0, window.screen.height || 0);
          isMobile = isWeChat || isPhoneUA || isTabletUA || isIpadOS || (touch && shortSide > 0 && shortSide <= 900);
          mobileLocked = true;
        }

        if (zoomHint) {
          if (isMobile) {
            zoomHint.className = 'zoom-hint visible';
            zoomHint.textContent = '双指捏合放大 · 双击还原';
          } else {
            zoomHint.className = 'zoom-hint desktop-hint visible';
            zoomHint.textContent = '滚轮缩放 · 中键拖动平移 · 双击还原';
          }
        }
        if (!isMobile) {
          zoom = 1;
          panX = 0;
          panY = 0;
        }
      }

      function setMobileViewportHeight() {
        if (!isMobile) {
          document.documentElement.style.height = '';
          document.body.style.height = '';
          return;
        }
        var h = getScreenHeight();
        document.documentElement.style.height = h + 'px';
        document.body.style.height = h + 'px';
      }

      function getAvailableHeight() {
        var h = getScreenHeight();
        if (isMobile && zoom <= 1.02) {
          return Math.max(1, h - 48);
        }
        return h;
      }

      function setLoadingText(text) {
        if (loadingStatus) loadingStatus.textContent = text;
      }

      function hideLoading() {
        if (loading) loading.className = 'loading';
      }

      function getScreenHeight() {
        if (window.visualViewport && window.visualViewport.height) {
          return window.visualViewport.height;
        }
        return window.innerHeight || document.documentElement.clientHeight || 1;
      }

      function getFitScale() {
        if (!imgW || !imgH) return 1;
        return Math.min(1, window.innerWidth / imgW, getAvailableHeight() / imgH);
      }

      function setTransform(el, value) {
        el.style.transform = value;
        el.style.webkitTransform = value;
        el.style.msTransform = value;
      }

      function clampPan() {
        var fit = getFitScale();
        var scale = fit * zoom;
        var displayW = imgW * scale;
        var displayH = imgH * scale;
        var maxPanX = Math.max(0, (displayW - window.innerWidth) / 2);
        var maxPanY = Math.max(0, (displayH - getAvailableHeight()) / 2);
        panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
        panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
      }

      function layoutFrame() {
        if (!imgW || !imgH) return;
        compare.style.width = imgW + 'px';
        compare.style.height = imgH + 'px';
        var fit = getFitScale();
        if (zoom <= 1.02) {
          panX = 0;
          panY = 0;
          zoom = 1;
        } else {
          clampPan();
        }
        if (isMobile || zoom > 1) {
          setTransform(frameWrap, 'translate(' + panX + 'px, ' + panY + 'px) scale(' + (fit * zoom) + ')');
        } else {
          setTransform(frameWrap, 'scale(' + fit + ')');
        }
      }

      function resetZoom() {
        zoom = 1;
        panX = 0;
        panY = 0;
        layoutFrame();
      }

      function setAfterClip(ratio) {
        if (supportsClipPath) {
          var hideRight = ((1 - ratio) * 100) + '%';
          var clipValue = 'inset(0 ' + hideRight + ' 0 0)';
          afterLayer.style.clipPath = clipValue;
          afterLayer.style.webkitClipPath = clipValue;
          afterLayer.style.clip = 'auto';
        } else if (imgW && imgH) {
          var right = Math.round(imgW * ratio);
          afterLayer.style.clip = 'rect(0px, ' + right + 'px, ' + imgH + 'px, 0px)';
        }
      }

      function setPosition(ratio) {
        pos = Math.max(0, Math.min(1, ratio));
        var pct = (pos * 100) + '%';
        divider.style.left = pct;
        handle.style.left = pct;
        setAfterClip(pos);
      }

      function readImageSize(img) {
        return {
          w: img.naturalWidth || 0,
          h: img.naturalHeight || 0
        };
      }

      function clientXFromEvent(e) {
        if (e.touches && e.touches.length) return e.touches[0].clientX;
        if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientX;
        return e.clientX;
      }

      function clientYFromEvent(e) {
        if (e.touches && e.touches.length) return e.touches[0].clientY;
        if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientY;
        return e.clientY;
      }

      function touchDistanceFromPoints(a, b) {
        var dx = a.x - b.x;
        var dy = a.y - b.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function touchDistance(touches) {
        return touchDistanceFromPoints(
          { x: touches[0].clientX, y: touches[0].clientY },
          { x: touches[1].clientX, y: touches[1].clientY }
        );
      }

      function isNearSlider(clientX) {
        var rect = compare.getBoundingClientRect();
        var sliderX = rect.left + rect.width * pos;
        return Math.abs(clientX - sliderX) < (isMobile ? 56 : 36);
      }

      function ratioFromEvent(e) {
        var rect = compare.getBoundingClientRect();
        var width = rect.width || imgW;
        if (!width) return pos;
        return (clientXFromEvent(e) - rect.left) / width;
      }

      function startSliderDrag(e) {
        if (e.type === 'mousedown' && e.button !== 0) return;
        dragging = true;
        gestureMode = 'slider';
        dragOffset = ratioFromEvent(e) - pos;
        if (e.preventDefault) e.preventDefault();
        var captureTarget = isMobile ? viewport : compare;
        if (e.pointerId !== undefined && captureTarget.setPointerCapture) {
          activePointerId = e.pointerId;
          captureTarget.setPointerCapture(e.pointerId);
        }
      }

      function startDesktopPan(e) {
        if (e.button !== 1) return;
        gestureMode = 'pan';
        panStartX = e.clientX;
        panStartY = e.clientY;
        panOriginX = panX;
        panOriginY = panY;
        if (e.preventDefault) e.preventDefault();
      }

      function onDesktopWheel(e) {
        if (isMobile || !inited) return;
        e.preventDefault();

        var fit = getFitScale();
        var oldZoom = zoom;
        var factor = e.deltaY < 0 ? 1.12 : 0.89;
        var newZoom = Math.max(minZoom, Math.min(maxZoom, zoom * factor));

        if (newZoom <= 1.02) {
          resetZoom();
          return;
        }

        var rect = frameWrap.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var oldScale = fit * oldZoom;
        var newScale = fit * newZoom;
        var ratio = newScale / oldScale;

        panX = panX + (e.clientX - cx) * (1 - ratio);
        panY = panY + (e.clientY - cy) * (1 - ratio);
        zoom = newZoom;
        layoutFrame();
      }

      function onDesktopDoubleClick(e) {
        if (isMobile) return;
        resetZoom();
        if (e.preventDefault) e.preventDefault();
      }

      function moveSliderDrag(e) {
        if (!dragging || gestureMode !== 'slider') return;
        if (activePointerId !== null && e.pointerId !== undefined && e.pointerId !== activePointerId) return;
        if (e.preventDefault) e.preventDefault();
        setPosition(ratioFromEvent(e) - dragOffset);
      }

      function endSliderDrag(e) {
        if (!dragging || gestureMode !== 'slider') return;
        if (activePointerId !== null && e.pointerId !== undefined && e.pointerId !== activePointerId) return;
        dragging = false;
        gestureMode = 'idle';
        var captureTarget = isMobile ? viewport : compare;
        if (activePointerId !== null && captureTarget.releasePointerCapture) {
          captureTarget.releasePointerCapture(activePointerId);
        }
        activePointerId = null;
      }

      function startPan(e) {
        gestureMode = 'pan';
        panStartX = clientXFromEvent(e);
        panStartY = clientYFromEvent(e);
        panOriginX = panX;
        panOriginY = panY;
        if (e.preventDefault) e.preventDefault();
      }

      function movePan(e) {
        if (gestureMode !== 'pan') return;
        var x = clientXFromEvent(e);
        var y = clientYFromEvent(e);
        if (x === undefined && e.clientX !== undefined) x = e.clientX;
        if (y === undefined && e.clientY !== undefined) y = e.clientY;
        panX = panOriginX + (x - panStartX);
        panY = panOriginY + (y - panStartY);
        layoutFrame();
        if (e.preventDefault) e.preventDefault();
      }

      function endPan() {
        if (gestureMode === 'pan') gestureMode = 'idle';
      }

      function startPinch(dist) {
        gestureMode = 'pinch';
        pinchStartDist = dist;
        pinchStartZoom = zoom;
      }

      function movePinch(dist) {
        if (gestureMode !== 'pinch' || !pinchStartDist) return;
        zoom = Math.max(minZoom, Math.min(maxZoom, pinchStartZoom * (dist / pinchStartDist)));
        if (zoom <= 1.02) {
          zoom = 1;
          panX = 0;
          panY = 0;
        }
        layoutFrame();
      }

      function endPinch() {
        if (gestureMode === 'pinch') gestureMode = 'idle';
        if (zoom <= 1.02) resetZoom();
      }

      function pointerCount() {
        var count = 0;
        for (var id in activePointers) {
          if (activePointers.hasOwnProperty(id)) count += 1;
        }
        return count;
      }

      function getPointerPoints() {
        var pts = [];
        for (var id in activePointers) {
          if (activePointers.hasOwnProperty(id)) pts.push(activePointers[id]);
        }
        return pts;
      }

      function onMobilePointerDown(e) {
        activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };

        if (pointerCount() === 2) {
          var pts = getPointerPoints();
          startPinch(touchDistanceFromPoints(pts[0], pts[1]));
          dragging = false;
          if (e.preventDefault) e.preventDefault();
          return;
        }

        if (pointerCount() === 1) {
          var now = Date.now();
          if (now - lastTapTime < 300) {
            resetZoom();
            lastTapTime = 0;
            if (e.preventDefault) e.preventDefault();
            return;
          }
          lastTapTime = now;
          if (zoom > 1.05 && !isNearSlider(e.clientX)) {
            startPan(e);
            return;
          }
        }

        startSliderDrag(e);
      }

      function onMobilePointerMove(e) {
        if (!activePointers[e.pointerId]) return;
        activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };

        if (pointerCount() >= 2) {
          var pts = getPointerPoints();
          if (pts.length >= 2) {
            if (gestureMode !== 'pinch') startPinch(touchDistanceFromPoints(pts[0], pts[1]));
            movePinch(touchDistanceFromPoints(pts[0], pts[1]));
          }
          if (e.preventDefault) e.preventDefault();
          return;
        }

        if (gestureMode === 'pan') {
          movePan(e);
          return;
        }

        moveSliderDrag(e);
      }

      function onMobilePointerUp(e) {
        delete activePointers[e.pointerId];
        if (gestureMode === 'pinch' && pointerCount() < 2) endPinch();
        if (gestureMode === 'pan' && pointerCount() === 0) endPan();
        if (gestureMode === 'slider') endSliderDrag(e);
      }

      function onMobileTouchStart(e) {
        if (e.touches.length === 2) {
          startPinch(touchDistance(e.touches));
          if (e.preventDefault) e.preventDefault();
          return;
        }
        if (e.touches.length === 1) {
          var now = Date.now();
          if (now - lastTapTime < 300) {
            resetZoom();
            lastTapTime = 0;
            if (e.preventDefault) e.preventDefault();
            return;
          }
          lastTapTime = now;
          if (zoom > 1.05 && !isNearSlider(e.touches[0].clientX)) {
            startPan(e);
            return;
          }
        }
        startSliderDrag(e);
      }

      function onMobileTouchMove(e) {
        if (e.touches.length >= 2) {
          if (gestureMode !== 'pinch') startPinch(touchDistance(e.touches));
          movePinch(touchDistance(e.touches));
          if (e.preventDefault) e.preventDefault();
          return;
        }
        if (gestureMode === 'pan') {
          movePan(e);
          return;
        }
        moveSliderDrag(e);
      }

      function onMobileTouchEnd(e) {
        if (gestureMode === 'pinch' && (!e.touches || e.touches.length < 2)) endPinch();
        if (gestureMode === 'pan' && (!e.touches || !e.touches.length)) endPan();
        if (gestureMode === 'slider') endSliderDrag(e);
      }

      function bindEvents() {
        if (eventsBound) return;
        eventsBound = true;

        if (isMobile) {
          if (window.PointerEvent) {
            viewport.addEventListener('pointerdown', onMobilePointerDown, false);
            viewport.addEventListener('pointermove', onMobilePointerMove, false);
            viewport.addEventListener('pointerup', onMobilePointerUp, false);
            viewport.addEventListener('pointercancel', onMobilePointerUp, false);
          } else {
            viewport.addEventListener('touchstart', onMobileTouchStart, false);
            viewport.addEventListener('touchmove', onMobileTouchMove, false);
            viewport.addEventListener('touchend', onMobileTouchEnd, false);
            viewport.addEventListener('touchcancel', onMobileTouchEnd, false);
          }
        } else if (window.PointerEvent) {
          compare.addEventListener('pointerdown', function (e) {
            if (!isMobile && e.button === 1 && zoom > 1.05) {
              startDesktopPan(e);
              return;
            }
            startSliderDrag(e);
          }, false);
          compare.addEventListener('pointermove', function (e) {
            if (gestureMode === 'pan') movePan(e);
            else moveSliderDrag(e);
          }, false);
          compare.addEventListener('pointerup', function (e) {
            if (gestureMode === 'pan') endPan();
            else endSliderDrag(e);
          }, false);
          compare.addEventListener('pointercancel', function (e) {
            if (gestureMode === 'pan') endPan();
            else endSliderDrag(e);
          }, false);
          compare.addEventListener('dblclick', onDesktopDoubleClick, false);
          viewport.addEventListener('wheel', onDesktopWheel, false);
        } else {
          compare.addEventListener('mousedown', function (e) {
            if (e.button === 1 && zoom > 1.05) startDesktopPan(e);
            else startSliderDrag(e);
          }, false);
          document.addEventListener('mousemove', function (e) {
            if (gestureMode === 'pan') movePan(e);
            else moveSliderDrag(e);
          }, false);
          document.addEventListener('mouseup', function (e) {
            if (gestureMode === 'pan') endPan();
            else endSliderDrag(e);
          }, false);
          compare.addEventListener('dblclick', onDesktopDoubleClick, false);
          viewport.addEventListener('wheel', onDesktopWheel, false);
        }
      }

      function onResize() {
        setMobileViewportHeight();
        if (inited) {
          if (zoom <= 1.02) {
            panX = 0;
            panY = 0;
          }
          layoutFrame();
        }
      }

      function onOrientationChange() {
        setTimeout(onResize, 100);
        setTimeout(onResize, 350);
      }

      if (window.addEventListener) {
        window.addEventListener('resize', onResize, false);
        window.addEventListener('orientationchange', onOrientationChange, false);
        window.addEventListener('pageshow', function (e) {
          if (e.persisted) onOrientationChange();
        }, false);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', onResize, false);
        }
      } else if (window.attachEvent) {
        window.attachEvent('onresize', onResize);
      }

      function init() {
        var size = readImageSize(beforeImg);
        if (!size.w || !size.h) return false;

        imgW = size.w;
        imgH = size.h;
        detectMobile();
        setMobileViewportHeight();
        bindEvents();
        layoutFrame();
        setPosition(pos);

        if (!inited) {
          inited = true;
          hideLoading();
        }
        return true;
      }

      function waitForImage(img, label, done) {
        var finished = false;

        function finish(ok) {
          if (finished) return;
          finished = true;
          if (ok && label) setLoadingText(label + ' 已加载');
          done();
        }

        function tryReady() {
          var size = readImageSize(img);
          if (size.w > 0 && size.h > 0) {
            finish(true);
            return true;
          }
          return false;
        }

        if (tryReady()) return;

        function onDone() {
          if (!tryReady()) finish(false);
        }

        img.addEventListener('load', onDone, false);
        img.addEventListener('error', onDone, false);
        if (img.decode) {
          img.decode().then(onDone).catch(onDone);
        }

        var attempts = 0;
        (function poll() {
          if (finished) return;
          if (tryReady()) return;
          attempts += 1;
          if (attempts > 80) {
            finish(false);
            return;
          }
          setTimeout(poll, 100);
        })();
      }

      function boot() {
        detectMobile();
        setMobileViewportHeight();
        bindEvents();

        if (isMobile) {
          if (loading) loading.className = 'loading show';
          setLoadingText('正在加载现状图…');
          waitForImage(beforeImg, '现状图', function () {
            init();
            waitForImage(afterImg, '设计图', function () {
              setAfterClip(pos);
            });
          });
        } else if (beforeImg.complete && afterImg.complete) {
          init();
        } else {
          var loaded = 0;
          function onLoad() {
            loaded += 1;
            if (loaded === 2) init();
          }
          beforeImg.addEventListener('load', onLoad, false);
          afterImg.addEventListener('load', onLoad, false);
          beforeImg.addEventListener('error', onLoad, false);
          afterImg.addEventListener('error', onLoad, false);
        }
      }

      boot();
    })();
  </script>
</body>
</html>
